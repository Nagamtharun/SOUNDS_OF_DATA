{% extends "base.html" %}

{% block content %}
<div class="fade-in" style="max-width: 800px; margin: 0 auto;">
    <div style="text-align: center; margin-bottom: 3rem;">
        <span class="step-icon"
            style="background: #e0e7ff; color: var(--primary); font-size: 3rem; width: 80px; height: 80px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 2rem;">✨</span>
        <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">Experience Your Data</h2>
        <p class="subtitle">Your dataset has been successfully translated into an auditory experience.</p>
    </div>

    <div class="glass-card" style="text-align: center;">

        <div
            style="background: #f8fafc; padding: 2.5rem; border-radius: 1.5rem; margin-bottom: 2.5rem; border: 1px solid #e2e8f0;">
            <div
                style="font-weight: 600; color: var(--text-muted); margin-bottom: 1rem; letter-spacing: 0.05em; text-transform: uppercase; font-size: 0.875rem;">
                Now Playing</div>
            <h3 style="margin-bottom: 2rem; font-size: 1.5rem;">audio_{{ filename }}</h3>

            <audio controls style="width: 100%; height: 50px; outline: none;">
                <source src="{{ audio_url }}" type="audio/wav">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div style="display: flex; justify-content: center; gap: 1rem;">
            <a href="{{ audio_url }}" class="btn" download>
                Download WAV
            </a>

        </div>
    </div>

    <div style="text-align: center; margin-top: 3rem; opacity: 0.6;">
        <a href="{{ url_for('visualize_page', filename=filename) }}"
            style="color: var(--text-main); text-decoration: none; font-size: 0.9rem; margin-right: 1.5rem;">&larr; Back
            to Previous Page</a>
        <span style="font-size: 0.875rem;">Created with The Sound of Data Engine</span>
    </div>
</div>
{% endblock %}
